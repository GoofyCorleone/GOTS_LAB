name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/*.[jt]s', '**/*.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: npm install

      # NEXT_PUBLIC_* vars are inlined into the bundle at build time, so if a
      # secret is missing the build dies deep inside prerendering with a bare
      # "supabaseUrl is required". Fail here instead, naming what's missing.
      - name: Check required secrets
        run: |
          missing=0
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ]; then
            echo "::error::Falta el secret NEXT_PUBLIC_SUPABASE_URL"
            missing=1
          fi
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" ]; then
            echo "::error::Falta el secret NEXT_PUBLIC_SUPABASE_ANON_KEY"
            missing=1
          fi
          if [ "$missing" = "1" ]; then
            echo "Configúralos en: Settings -> Secrets and variables -> Actions -> New repository secret"
            echo "Los nombres deben coincidir EXACTAMENTE (mayúsculas y guiones bajos)."
            exit 1
          fi
          echo "Ambos secrets están configurados."

      - name: Build with Next.js
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # GitHub Pages runs Jekyll by default, and Jekyll ignores any directory
      # starting with an underscore — which would drop the whole /_next folder
      # (all CSS and JS). Without this the site deploys but renders unstyled.
      - name: Disable Jekyll processing
        run: touch ./out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
